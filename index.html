<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&P Brothers — Outreach Log</title>
<!--
  ============================================================================
  SETUP — do this once before the site will work:

  1. Go to https://console.firebase.google.com and create a free project.
  2. Click the "</>" (Web) icon to register a web app. Copy the config object
     it gives you and paste it into FIREBASE_CONFIG below.
  3. In the left menu: Build > Authentication > Get started > Sign-in method
     > enable "Email/Password".
  4. In the left menu: Build > Firestore Database > Create database >
     start in "test mode" for now.
  5. Go to Firestore > Rules tab and paste in the ruleset from RULES.txt
     (see the comment block at the bottom of this file) > Publish.
  6. Set ADMIN_SIGNUP_CODE below to a secret word only you know.
     Whoever types this code correctly when signing up becomes Admin.
     Everyone else who signs up becomes a Caller automatically.
  7. Push to GitHub, redeploy on Vercel. Done.
  ============================================================================
-->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  :root {
    --navy: #142433;
    --navy-deep: #0d1a26;
    --gold: #c8963e;
    --gold-light: #e0b465;
    --slate: #55636f;
    --slate-light: #8b98a3;
    --line: #e2e6ea;
    --bg: #f6f7f9;
    --card: #ffffff;
    --green: #2f8f5b;
    --red: #c1443a;
    --blue: #2f6fa8;
    --grey-tag: #eef0f3;
    font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: #1b2431; }

  .auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, var(--navy-deep) 0%, var(--navy) 60%);
    padding: 20px;
  }
  .auth-card {
    background: var(--card);
    border-radius: 14px;
    padding: 34px 32px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  }
  .auth-brand { text-align: center; margin-bottom: 22px; }
  .auth-brand .mark {
    display: inline-block;
    width: 46px; height: 46px;
    border-radius: 10px;
    background: var(--navy);
    color: var(--gold-light);
    font-weight: 800;
    font-size: 18px;
    line-height: 46px;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .auth-brand h1 { font-size: 17px; margin: 0; color: var(--navy); }
  .auth-brand .sub { font-size: 12px; color: var(--slate-light); margin-top: 2px; }
  .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--line); }
  .auth-tabs button {
    flex: 1; padding: 9px 0; background: none; border: none;
    font-size: 13.5px; font-weight: 600; color: var(--slate-light);
    cursor: pointer; border-bottom: 2px solid transparent;
  }
  .auth-tabs button.active { color: var(--navy); border-bottom-color: var(--gold); }
  .auth-error {
    background: #fbeae8; color: var(--red); font-size: 12.5px;
    padding: 8px 12px; border-radius: 7px; margin-bottom: 12px;
  }
  .auth-hint { font-size: 11.5px; color: var(--slate-light); margin-top: 4px; }

  label { display: block; font-size: 12px; font-weight: 600; color: var(--slate); margin-bottom: 4px; }
  input, select, textarea {
    width: 100%; padding: 10px 11px; border: 1px solid var(--line); border-radius: 8px;
    font-size: 13.5px; font-family: inherit; background: #fbfcfd; color: #1b2431;
  }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--navy); outline-offset: 0; background: white; }
  textarea { resize: vertical; min-height: 54px; }
  .field { margin-bottom: 14px; }

  .btn {
    background: var(--navy); color: white; border: none; padding: 11px 18px;
    border-radius: 8px; font-size: 13.5px; font-weight: 700; cursor: pointer; width: 100%;
  }
  .btn:hover { background: var(--navy-deep); }
  .btn.gold { background: var(--gold); color: #241a08; }
  .btn.gold:hover { background: var(--gold-light); }
  .btn.secondary { background: white; color: var(--navy); border: 1px solid var(--line); width: auto; }
  .btn.secondary:hover { background: var(--grey-tag); }
  .btn.small { padding: 6px 11px; font-size: 12px; width: auto; }
  .btn.wfull { width: 100%; }

  .app { max-width: 980px; margin: 0 auto; padding: 22px 18px 60px; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
    background: var(--navy); padding: 16px 20px; border-radius: 12px; color: white;
  }
  .topbar .brand { display: flex; align-items: center; gap: 12px; }
  .topbar .mark {
    width: 38px; height: 38px; border-radius: 9px; background: rgba(255,255,255,0.12);
    color: var(--gold-light); font-weight: 800; font-size: 15px; line-height: 38px; text-align: center;
  }
  .topbar h1 { font-size: 16.5px; margin: 0; }
  .topbar .sub { font-size: 11.5px; color: #b9c3cc; margin-top: 1px; }
  .topbar .who { font-size: 12.5px; color: #dfe6ec; text-align: right; }
  .topbar .who b { color: white; }
  .topbar .logout {
    background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.25);
    padding: 7px 13px; border-radius: 7px; font-size: 12px; cursor: pointer; margin-left: 10px;
  }
  .topbar .logout:hover { background: rgba(255,255,255,0.18); }
  .topbar-right { display: flex; align-items: center; }

  nav {
    display: flex; gap: 4px; background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; padding: 4px; margin-bottom: 18px; overflow-x: auto;
  }
  nav button {
    border: none; background: transparent; padding: 9px 16px; font-size: 13.5px;
    font-weight: 600; color: var(--slate); border-radius: 7px; cursor: pointer; white-space: nowrap;
  }
  nav button.active { background: var(--navy); color: white; }
  nav button:not(.active):hover { background: var(--grey-tag); }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 20px; margin-bottom: 16px;
  }
  .card h2 {
    font-size: 15px; margin: 0 0 14px 0; color: var(--navy);
    border-left: 3px solid var(--gold); padding-left: 10px;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 620px) { .grid2 { grid-template-columns: 1fr; } }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 4px; }
  .stat { background: #fbfcfd; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; border-top: 3px solid var(--gold); }
  .stat .num { font-size: 22px; font-weight: 800; color: var(--navy); line-height: 1.1; }
  .stat .lbl { font-size: 11.5px; color: var(--slate-light); margin-top: 2px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em;
    color: var(--slate-light); padding: 8px 10px; border-bottom: 1px solid var(--line);
  }
  td { padding: 9px 10px; border-bottom: 1px solid #eef0f3; vertical-align: top; }
  tr:hover td { background: #fafbfc; }

  .tag { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
  .tag.interested { background: #e5f3ec; color: var(--green); }
  .tag.callback { background: #fdf1e2; color: var(--gold); }
  .tag.meeting { background: #e6eef8; color: var(--blue); }
  .tag.voicemail, .tag.noanswer, .tag.wrongnumber, .tag.gatekeeper, .tag.notinterested { background: var(--grey-tag); color: var(--slate); }
  .tag.hungup { background: #fbeae8; color: var(--red); }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .filters select, .filters input { width: auto; min-width: 130px; }

  .empty { text-align: center; padding: 40px 20px; color: var(--slate-light); font-size: 13.5px; }
  .link-ref { font-size: 12.5px; color: var(--blue); word-break: break-all; }
  .table-wrap { overflow-x: auto; }

  .person-breakdown { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
  .person-card { border: 1px solid var(--line); border-radius: 10px; padding: 14px; background: #fbfcfd; border-top: 3px solid var(--gold); }
  .person-card .name { font-weight: 700; color: var(--navy); font-size: 14px; margin-bottom: 8px; }
  .person-card .role-badge {
    display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    background: var(--navy); color: white; margin-left: 6px; vertical-align: middle;
  }
  .person-card .metric-row { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--slate); padding: 2px 0; }
  .person-card .metric-row b { color: #1b2431; }

  .save-msg { font-size: 12px; color: var(--green); margin-left: 10px; opacity: 0; transition: opacity .3s; }
  .save-msg.show { opacity: 1; }

  .notice {
    background: #fff8ec; border: 1px solid #f0dfb8; color: #8a6a1f;
    padding: 10px 14px; border-radius: 8px; font-size: 12.5px; margin-bottom: 16px;
  }
  .loading { text-align: center; padding: 60px 20px; color: var(--slate-light); }

  .caller-shell { max-width: 520px; margin: 0 auto; padding: 24px 18px 60px; }
  .confirm-box { text-align: center; padding: 40px 20px; }
  .confirm-box .check {
    width: 60px; height: 60px; border-radius: 50%;
    background: #e5f3ec; color: var(--green);
    font-size: 30px; line-height: 60px; margin: 0 auto 14px;
  }
  .confirm-box h3 { color: var(--navy); margin: 0 0 6px 0; }
  .confirm-box p { color: var(--slate); font-size: 13.5px; margin: 0 0 20px 0; }
</style>
</head>
<body>

<div id="app"><div class="loading">Loading…</div></div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID",
};

const ADMIN_SIGNUP_CODE = "CHANGE_THIS_SECRET_CODE";

let auth = null, db = null, firebaseReady = false;
try {
  if (FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY") {
    firebase.initializeApp(FIREBASE_CONFIG);
    auth = firebase.auth();
    db = firebase.firestore();
    firebaseReady = true;
  }
} catch (e) { console.error("Firebase init failed", e); }

const OUTCOMES = [
  { key: "interested", label: "Interested", tagClass: "interested" },
  { key: "callback", label: "Callback requested", tagClass: "callback" },
  { key: "meeting", label: "Meeting booked", tagClass: "meeting" },
  { key: "voicemail", label: "Voicemail / answering machine", tagClass: "voicemail" },
  { key: "noanswer", label: "No answer", tagClass: "noanswer" },
  { key: "hungup", label: "Hung up", tagClass: "hungup" },
  { key: "gatekeeper", label: "Blocked by gatekeeper", tagClass: "gatekeeper" },
  { key: "wrongnumber", label: "Wrong number", tagClass: "wrongnumber" },
  { key: "notinterested", label: "Not interested", tagClass: "notinterested" },
];
function outcomeMeta(key) { return OUTCOMES.find(o => o.key === key) || OUTCOMES[4]; }
function todayStr() { return new Date().toISOString().slice(0,10); }
function escapeHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

let state = {
  user: null,
  profile: null,
  view: 'log',
  authMode: 'login',
  authError: '',
  users: [],
  calls: [],
  loaded: false,
  filterIntern: 'all',
  filterOutcome: 'all',
  filterDate: '',
  justSaved: false,
};

function renderAuthScreen() {
  const isSignup = state.authMode === 'signup';
  document.getElementById('app').innerHTML = `
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-brand">
          <div class="mark">D&amp;P</div>
          <h1>D&amp;P Brothers</h1>
          <div class="sub">Outreach Call Log</div>
        </div>
        <div class="auth-tabs">
          <button class="${!isSignup?'active':''}" onclick="switchAuthMode('login')">Log in</button>
          <button class="${isSignup?'active':''}" onclick="switchAuthMode('signup')">Sign up</button>
        </div>
        ${state.authError ? `<div class="auth-error">${escapeHtml(state.authError)}</div>` : ''}
        <form id="authForm">
          ${isSignup ? `
          <div class="field">
            <label>Your name</label>
            <input type="text" name="name" required placeholder="e.g. Ali Khan">
          </div>` : ''}
          <div class="field">
            <label>Email</label>
            <input type="email" name="email" required placeholder="you@example.com">
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" name="password" required minlength="6" placeholder="At least 6 characters">
          </div>
          ${isSignup ? `
          <div class="field">
            <label>Admin code (leave blank if you're a caller)</label>
            <input type="text" name="adminCode" placeholder="Only if given one">
            <div class="auth-hint">Everyone signs up here. Only people with the correct admin code get admin access — everyone else is added as a caller.</div>
          </div>` : ''}
          <button type="submit" class="btn gold wfull">${isSignup ? 'Create account' : 'Log in'}</button>
        </form>
      </div>
    </div>
  `;
  document.getElementById('authForm').addEventListener('submit', handleAuthSubmit);
}

function switchAuthMode(mode) {
  state.authMode = mode;
  state.authError = '';
  renderAuthScreen();
}
window.switchAuthMode = switchAuthMode;

async function handleAuthSubmit(e) {
  e.preventDefault();
  if (!firebaseReady) {
    state.authError = "Firebase isn't configured yet — the site owner needs to add the config (see setup comment at the top of the file).";
    renderAuthScreen();
    return;
  }
  const fd = new FormData(e.target);
  const email = fd.get('email');
  const password = fd.get('password');
  state.authError = '';
  try {
    if (state.authMode === 'signup') {
      const name = fd.get('name');
      const adminCode = (fd.get('adminCode') || '').trim();
      const role = (adminCode && adminCode === ADMIN_SIGNUP_CODE) ? 'admin' : 'caller';
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      await db.collection('users').doc(cred.user.uid).set({
        name, role, email, createdAt: new Date().toISOString(),
      });
    } else {
      await auth.signInWithEmailAndPassword(email, password);
    }
  } catch (err) {
    state.authError = friendlyAuthError(err);
    renderAuthScreen();
  }
}

function friendlyAuthError(err) {
  const code = err.code || '';
  if (code.includes('email-already-in-use')) return 'An account already exists with that email — try logging in instead.';
  if (code.includes('wrong-password') || code.includes('invalid-credential')) return 'Incorrect email or password.';
  if (code.includes('user-not-found')) return 'No account found with that email.';
  if (code.includes('weak-password')) return 'Password should be at least 6 characters.';
  if (code.includes('invalid-email')) return 'That email address doesn\'t look right.';
  return err.message || 'Something went wrong — please try again.';
}

async function logout() {
  await auth.signOut();
}
window.logout = logout;

async function loadAdminData() {
  try {
    const usersSnap = await db.collection('users').get();
    state.users = usersSnap.docs.map(d => ({ uid: d.id, ...d.data() }));
  } catch (e) { console.error('Failed loading users', e); state.users = []; }

  try {
    const callsSnap = await db.collection('calls').orderBy('createdAt', 'desc').get();
    state.calls = callsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) { console.error('Failed loading calls', e); state.calls = []; }
}

async function saveCall(call) {
  try {
    await db.collection('calls').add({ ...call, uid: state.user.uid });
    return true;
  } catch (e) {
    console.error('Failed saving call', e);
    return false;
  }
}

async function deleteCall(id) {
  try {
    await db.collection('calls').doc(id).delete();
    state.calls = state.calls.filter(c => c.id !== id);
    render();
  } catch (e) { console.error('Failed deleting call', e); alert('Could not delete — check console for details.'); }
}
window.confirmDelete = function(id) {
  if (confirm('Delete this call entry? This cannot be undone.')) deleteCall(id);
};

async function updateUserRole(uid, newRole) {
  try {
    await db.collection('users').doc(uid).update({ role: newRole });
    state.users = state.users.map(u => u.uid === uid ? { ...u, role: newRole } : u);
    render();
  } catch (e) { console.error('Failed updating role', e); alert('Could not update role — check console for details.'); }
}
window.updateUserRole = updateUserRole;

function renderCallerShell() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar" style="border-radius:0;">
      <div class="brand">
        <div class="mark">D&amp;P</div>
        <div>
          <h1>Outreach Log</h1>
          <div class="sub">D&amp;P Brothers</div>
        </div>
      </div>
      <div class="topbar-right">
        <span class="who"><b>${escapeHtml(state.profile.name)}</b><br>Caller</span>
        <button class="logout" onclick="logout()">Log out</button>
      </div>
    </div>
    <div class="caller-shell" id="callerBody"></div>
  `;
  renderCallerBody();
}

function renderCallerBody() {
  const body = document.getElementById('callerBody');
  if (state.justSaved) {
    body.innerHTML = `
      <div class="card confirm-box">
        <div class="check">✓</div>
        <h3>Call logged</h3>
        <p>Thanks — that's saved. Ready for the next one?</p>
        <button class="btn gold" onclick="logAnother()">Log another call</button>
      </div>
    `;
    return;
  }
  body.innerHTML = `
    <div class="card">
      <h2>Log a call <span class="save-msg" id="saveMsg">Saved ✓</span></h2>
      <form id="callForm">
        <div class="field">
          <label>Date</label>
          <input type="date" name="date" value="${todayStr()}" required>
        </div>
        <div class="field">
          <label>Firm / Company called</label>
          <input type="text" name="firm" placeholder="e.g. Hallworth Architects" required>
        </div>
        <div class="field">
          <label>Contact person (optional)</label>
          <input type="text" name="contact" placeholder="e.g. James, Office Manager">
        </div>
        <div class="field">
          <label>Outcome</label>
          <select name="outcome" required>
            <option value="">Select…</option>
            ${OUTCOMES.map(o => `<option value="${o.key}">${o.label}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Follow-up date (if applicable)</label>
          <input type="date" name="followUp">
        </div>
        <div class="field">
          <label>Notes</label>
          <textarea name="notes" placeholder="Anything worth remembering — what they build, who else to speak to, objections raised..."></textarea>
        </div>
        <div class="field">
          <label>Recording reference (link to where the recording is saved, if any)</label>
          <input type="text" name="recording" placeholder="e.g. Drive link, or filename in shared folder">
        </div>
        <button type="submit" class="btn gold wfull">Save call</button>
      </form>
    </div>
  `;
  document.getElementById('callForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const call = {
      date: fd.get('date'),
      intern: state.profile.name,
      firm: fd.get('firm'),
      contact: fd.get('contact'),
      outcome: fd.get('outcome'),
      followUp: fd.get('followUp'),
      notes: fd.get('notes'),
      recording: fd.get('recording'),
      createdAt: new Date().toISOString(),
    };
    const ok = await saveCall(call);
    if (ok) {
      state.justSaved = true;
      renderCallerBody();
    } else {
      alert('Could not save this call — please check your connection and try again.');
    }
  });
}

function logAnother() {
  state.justSaved = false;
  renderCallerBody();
}
window.logAnother = logAnother;

function setView(v) { state.view = v; render(); }
window.setView = setView;

function renderAdminShell() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="app">
      <div class="topbar">
        <div class="brand">
          <div class="mark">D&amp;P</div>
          <div>
            <h1>Outreach Call Log</h1>
            <div class="sub">D&amp;P Brothers — Admin view</div>
          </div>
        </div>
        <div class="topbar-right">
          <span class="who"><b>${escapeHtml(state.profile.name)}</b><br>Admin</span>
          <button class="logout" onclick="logout()">Log out</button>
        </div>
      </div>
      <nav>
        <button class="${state.view==='log'?'active':''}" onclick="setView('log')">Log a Call</button>
        <button class="${state.view==='dashboard'?'active':''}" onclick="setView('dashboard')">Dashboard</button>
        <button class="${state.view==='pipeline'?'active':''}" onclick="setView('pipeline')">Pipeline</button>
        <button class="${state.view==='all'?'active':''}" onclick="setView('all')">All Calls</button>
        <button class="${state.view==='team'?'active':''}" onclick="setView('team')">Team</button>
      </nav>
      <div id="viewRoot"></div>
    </div>
  `;
  const root = document.getElementById('viewRoot');
  if (state.view === 'log') root.innerHTML = renderAdminLogView();
  else if (state.view === 'dashboard') root.innerHTML = renderDashboard();
  else if (state.view === 'pipeline') root.innerHTML = renderPipeline();
  else if (state.view === 'all') root.innerHTML = renderAllCalls();
  else if (state.view === 'team') root.innerHTML = renderTeam();
  attachAdminHandlers();
}

function renderAdminLogView() {
  return `
    <div class="card">
      <h2>Log a call (as ${escapeHtml(state.profile.name)}) <span class="save-msg" id="saveMsg">Saved ✓</span></h2>
      <form id="callForm">
        <div class="grid2">
          <div class="field">
            <label>Date</label>
            <input type="date" name="date" value="${todayStr()}" required>
          </div>
          <div class="field">
            <label>Firm / Company called</label>
            <input type="text" name="firm" placeholder="e.g. Hallworth Architects" required>
          </div>
        </div>
        <div class="grid2">
          <div class="field">
            <label>Contact person (optional)</label>
            <input type="text" name="contact" placeholder="e.g. James, Office Manager">
          </div>
          <div class="field">
            <label>Outcome</label>
            <select name="outcome" required>
              <option value="">Select…</option>
              ${OUTCOMES.map(o => `<option value="${o.key}">${o.label}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="grid2">
          <div class="field">
            <label>Follow-up date (if applicable)</label>
            <input type="date" name="followUp">
          </div>
          <div class="field">
            <label>Recording reference</label>
            <input type="text" name="recording" placeholder="Drive link or filename">
          </div>
        </div>
        <div class="field">
          <label>Notes</label>
          <textarea name="notes"></textarea>
        </div>
        <button type="submit" class="btn gold" style="width:auto;">Save call</button>
      </form>
    </div>
    <div class="card">
      <h2>Today's calls (whole team)</h2>
      ${renderTodayMiniList()}
    </div>
  `;
}

function renderTodayMiniList() {
  const today = todayStr();
  const todays = state.calls.filter(c => c.date === today);
  if (todays.length === 0) return '<div class="empty">No calls logged yet today.</div>';
  return `
    <div class="table-wrap">
    <table>
      <thead><tr><th>Caller</th><th>Firm</th><th>Outcome</th><th>Notes</th></tr></thead>
      <tbody>
        ${todays.map(c => {
          const om = outcomeMeta(c.outcome);
          return `<tr>
            <td>${escapeHtml(c.intern)}</td>
            <td>${escapeHtml(c.firm)}</td>
            <td><span class="tag ${om.tagClass}">${om.label}</span></td>
            <td>${escapeHtml(c.notes || '—')}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>
  `;
}

function renderDashboard() {
  const today = todayStr();
  const totalToday = state.calls.filter(c => c.date === today).length;
  const total = state.calls.length;
  const count = (key) => state.calls.filter(c => c.outcome === key).length;
  const answered = state.calls.filter(c => !['voicemail','noanswer','wrongnumber','gatekeeper'].includes(c.outcome)).length;
  const interestedTotal = count('interested') + count('callback');
  const meetingsTotal = count('meeting');

  const byPerson = {};
  state.users.forEach(u => byPerson[u.name] = { calls: 0, answered: 0, voicemail: 0, hungup: 0, meetings: 0, interested: 0, role: u.role });
  state.calls.forEach(c => {
    if (!byPerson[c.intern]) byPerson[c.intern] = { calls: 0, answered: 0, voicemail: 0, hungup: 0, meetings: 0, interested: 0, role: '' };
    byPerson[c.intern].calls++;
    if (!['voicemail','noanswer','wrongnumber','gatekeeper'].includes(c.outcome)) byPerson[c.intern].answered++;
    if (c.outcome === 'voicemail') byPerson[c.intern].voicemail++;
    if (c.outcome === 'hungup') byPerson[c.intern].hungup++;
    if (c.outcome === 'meeting') byPerson[c.intern].meetings++;
    if (c.outcome === 'interested' || c.outcome === 'callback') byPerson[c.intern].interested++;
  });

  return `
    <div class="card">
      <h2>Overview — all time</h2>
      <div class="stat-grid">
        <div class="stat"><div class="num">${total}</div><div class="lbl">Total calls logged</div></div>
        <div class="stat"><div class="num">${totalToday}</div><div class="lbl">Calls today</div></div>
        <div class="stat"><div class="num">${answered}</div><div class="lbl">Actually answered</div></div>
        <div class="stat"><div class="num">${count('voicemail')}</div><div class="lbl">Voicemail / machine</div></div>
        <div class="stat"><div class="num">${count('hungup')}</div><div class="lbl">Hung up</div></div>
        <div class="stat"><div class="num">${interestedTotal}</div><div class="lbl">Interested / callback</div></div>
        <div class="stat"><div class="num">${meetingsTotal}</div><div class="lbl">Meetings booked</div></div>
      </div>
    </div>
    <div class="card">
      <h2>By team member</h2>
      <div class="person-breakdown">
        ${Object.entries(byPerson).map(([name, s]) => `
          <div class="person-card">
            <div class="name">${escapeHtml(name)}${s.role ? `<span class="role-badge">${s.role}</span>` : ''}</div>
            <div class="metric-row"><span>Calls made</span><b>${s.calls}</b></div>
            <div class="metric-row"><span>Answered</span><b>${s.answered}</b></div>
            <div class="metric-row"><span>Voicemail</span><b>${s.voicemail}</b></div>
            <div class="metric-row"><span>Hung up</span><b>${s.hungup}</b></div>
            <div class="metric-row"><span>Interested / callback</span><b>${s.interested}</b></div>
            <div class="metric-row"><span>Meetings booked</span><b>${s.meetings}</b></div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderPipeline() {
  const pipelineOutcomes = ['interested', 'callback', 'meeting'];
  let entries = state.calls.filter(c => pipelineOutcomes.includes(c.outcome));
  entries = entries.slice().sort((a,b) => (a.followUp || '9999-99-99').localeCompare(b.followUp || '9999-99-99'));

  if (entries.length === 0) {
    return `<div class="card"><h2>Pipeline</h2><div class="empty">No live leads yet — entries marked Interested, Callback Requested, or Meeting Booked will show up here.</div></div>`;
  }
  return `
    <div class="card">
      <h2>Pipeline — leads worth following up</h2>
      <div class="table-wrap">
      <table>
        <thead><tr><th>Firm</th><th>Contact</th><th>Caller</th><th>Status</th><th>Follow-up date</th><th>Notes</th></tr></thead>
        <tbody>
          ${entries.map(c => {
            const om = outcomeMeta(c.outcome);
            const overdue = c.followUp && c.followUp < todayStr();
            return `<tr>
              <td>${escapeHtml(c.firm)}</td>
              <td>${escapeHtml(c.contact || '—')}</td>
              <td>${escapeHtml(c.intern)}</td>
              <td><span class="tag ${om.tagClass}">${om.label}</span></td>
              <td style="${overdue ? 'color:var(--red);font-weight:700;' : ''}">${c.followUp ? c.followUp + (overdue ? ' (overdue)' : '') : '—'}</td>
              <td>${escapeHtml(c.notes || '—')}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>
    </div>
  `;
}

function renderAllCalls() {
  let filtered = state.calls;
  if (state.filterIntern !== 'all') filtered = filtered.filter(c => c.intern === state.filterIntern);
  if (state.filterOutcome !== 'all') filtered = filtered.filter(c => c.outcome === state.filterOutcome);
  if (state.filterDate) filtered = filtered.filter(c => c.date === state.filterDate);

  return `
    <div class="card">
      <h2>All calls</h2>
      <div class="filters">
        <select id="fIntern">
          <option value="all">All callers</option>
          ${state.users.map(u => `<option value="${escapeHtml(u.name)}" ${state.filterIntern===u.name?'selected':''}>${escapeHtml(u.name)}</option>`).join('')}
        </select>
        <select id="fOutcome">
          <option value="all">All outcomes</option>
          ${OUTCOMES.map(o => `<option value="${o.key}" ${state.filterOutcome===o.key?'selected':''}>${o.label}</option>`).join('')}
        </select>
        <input type="date" id="fDate" value="${state.filterDate}">
        <button class="btn secondary small" onclick="clearFilters()">Clear filters</button>
      </div>
      ${filtered.length === 0 ? '<div class="empty">No calls match these filters.</div>' : `
      <div class="table-wrap">
      <table>
        <thead><tr><th>Date</th><th>Caller</th><th>Firm</th><th>Contact</th><th>Outcome</th><th>Follow-up</th><th>Notes</th><th>Recording</th><th></th></tr></thead>
        <tbody>
          ${filtered.map(c => {
            const om = outcomeMeta(c.outcome);
            return `<tr>
              <td>${c.date}</td>
              <td>${escapeHtml(c.intern)}</td>
              <td>${escapeHtml(c.firm)}</td>
              <td>${escapeHtml(c.contact || '—')}</td>
              <td><span class="tag ${om.tagClass}">${om.label}</span></td>
              <td>${c.followUp || '—'}</td>
              <td>${escapeHtml(c.notes || '—')}</td>
              <td>${c.recording ? `<span class="link-ref">${escapeHtml(c.recording)}</span>` : '—'}</td>
              <td><button class="btn secondary small" onclick="confirmDelete('${c.id}')">Delete</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>`}
    </div>
  `;
}

function renderTeam() {
  return `
    <div class="card">
      <h2>Team</h2>
      <div class="notice">New people join by signing up themselves at the login screen. They'll appear here once they do — use the dropdown to change their role.</div>
      ${state.users.length === 0 ? '<div class="empty">No one has signed up yet.</div>' : `
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Role</th></tr></thead>
        <tbody>
          ${state.users.map(u => `<tr>
            <td>${escapeHtml(u.name)}</td>
            <td>${escapeHtml(u.email || '—')}</td>
            <td>
              <select onchange="updateUserRole('${u.uid}', this.value)" style="width:auto;">
                <option value="caller" ${u.role==='caller'?'selected':''}>Caller</option>
                <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
              </select>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  `;
}

function attachAdminHandlers() {
  const callForm = document.getElementById('callForm');
  if (callForm) {
    callForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(callForm);
      const call = {
        date: fd.get('date'),
        intern: state.profile.name,
        firm: fd.get('firm'),
        contact: fd.get('contact'),
        outcome: fd.get('outcome'),
        followUp: fd.get('followUp'),
        notes: fd.get('notes'),
        recording: fd.get('recording'),
        createdAt: new Date().toISOString(),
      };
      const ok = await saveCall(call);
      if (ok) {
        call.id = 'temp-' + Date.now();
        state.calls.unshift(call);
        render();
        const el = document.getElementById('saveMsg');
        if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1600); }
      } else {
        alert('Could not save this call — please try again.');
      }
    });
  }
  const fIntern = document.getElementById('fIntern');
  if (fIntern) fIntern.addEventListener('change', () => { state.filterIntern = fIntern.value; render(); });
  const fOutcome = document.getElementById('fOutcome');
  if (fOutcome) fOutcome.addEventListener('change', () => { state.filterOutcome = fOutcome.value; render(); });
  const fDate = document.getElementById('fDate');
  if (fDate) fDate.addEventListener('change', () => { state.filterDate = fDate.value; render(); });
}

function clearFilters() {
  state.filterIntern = 'all'; state.filterOutcome = 'all'; state.filterDate = '';
  render();
}
window.clearFilters = clearFilters;

async function render() {
  if (!state.user) { renderAuthScreen(); return; }
  if (!state.profile) {
    document.getElementById('app').innerHTML = '<div class="loading">Setting things up…</div>';
    return;
  }
  if (state.profile.role === 'admin') {
    if (!state.loaded) {
      document.getElementById('app').innerHTML = '<div class="loading">Loading…</div>';
      await loadAdminData();
      state.loaded = true;
    }
    renderAdminShell();
  } else {
    renderCallerShell();
  }
}

if (firebaseReady) {
  auth.onAuthStateChanged(async (user) => {
    state.user = user;
    state.profile = null;
    state.loaded = false;
    if (user) {
      try {
        const doc = await db.collection('users').doc(user.uid).get();
        state.profile = doc.exists ? doc.data() : { name: user.email, role: 'caller' };
      } catch (e) {
        console.error('Failed loading profile', e);
        state.profile = { name: user.email, role: 'caller' };
      }
    }
    render();
  });
} else {
  document.getElementById('app').innerHTML = `
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-brand">
          <div class="mark">D&amp;P</div>
          <h1>Setup needed</h1>
          <div class="sub">Firebase isn't configured yet</div>
        </div>
        <p style="font-size:13px;color:var(--slate);">
          Open this file and fill in <b>FIREBASE_CONFIG</b> near the top of the script
          (see the setup instructions in the HTML comment at the very top of the file).
        </p>
      </div>
    </div>
  `;
}
</script>

<!--
  ============================================================================
  RULES.txt — paste this into Firebase console > Firestore Database > Rules

  rules_version = '2';
  service cloud.firestore {
    match /databases/{database}/documents {
      function isAdmin() {
        return exists(/databases/$(database)/documents/users/$(request.auth.uid)) &&
          get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin';
      }
      match /users/{userId} {
        allow read: if request.auth != null && (request.auth.uid == userId || isAdmin());
        allow create: if request.auth != null && request.auth.uid == userId;
        allow update: if request.auth != null && isAdmin();
      }
      match /calls/{callId} {
        allow create: if request.auth != null;
        allow read, update, delete: if request.auth != null && isAdmin();
      }
    }
  }
  ============================================================================
