<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Outreach Log</title>
<style>
  :root {
    --navy: #16233d;
    --navy-light: #223357;
    --slate: #4b5768;
    --slate-light: #8792a1;
    --line: #dfe3ea;
    --bg: #f4f6f9;
    --card: #ffffff;
    --amber: #c9852a;
    --green: #2f8f5b;
    --red: #c34a3d;
    --blue: #2f6fa8;
    --grey-tag: #eef0f3;
    font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: #1b2431;
  }

  .app {
    max-width: 980px;
    margin: 0 auto;
    padding: 22px 18px 60px;
  }

  .topbar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .topbar h1 {
    font-size: 20px;
    margin: 0;
    color: var(--navy);
    letter-spacing: -0.2px;
  }

  .topbar .sub {
    font-size: 12.5px;
    color: var(--slate-light);
  }

  nav {
    display: flex;
    gap: 4px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 18px;
    overflow-x: auto;
  }

  nav button {
    border: none;
    background: transparent;
    padding: 9px 16px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--slate);
    border-radius: 7px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s, color .15s;
  }

  nav button.active {
    background: var(--navy);
    color: white;
  }

  nav button:not(.active):hover {
    background: var(--grey-tag);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .card h2 {
    font-size: 15px;
    margin: 0 0 14px 0;
    color: var(--navy);
  }

  .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media (max-width: 620px) {
    .grid2 { grid-template-columns: 1fr; }
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--slate);
    margin-bottom: 4px;
  }

  input, select, textarea {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 7px;
    font-size: 13.5px;
    font-family: inherit;
    background: #fbfcfd;
    color: #1b2431;
  }

  input:focus, select:focus, textarea:focus {
    outline: 2px solid var(--navy-light);
    outline-offset: 0;
    background: white;
  }

  textarea { resize: vertical; min-height: 54px; }

  .field { margin-bottom: 12px; }

  .btn {
    background: var(--navy);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn:hover { background: var(--navy-light); }
  .btn.secondary {
    background: white;
    color: var(--navy);
    border: 1px solid var(--line);
  }
  .btn.secondary:hover { background: var(--grey-tag); }
  .btn.small { padding: 6px 11px; font-size: 12px; }

  .row-actions { display: flex; gap: 8px; margin-top: 4px; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 4px;
  }

  .stat {
    background: #fbfcfd;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .stat .num {
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.1;
  }
  .stat .lbl {
    font-size: 11.5px;
    color: var(--slate-light);
    margin-top: 2px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--slate-light);
    padding: 8px 10px;
    border-bottom: 1px solid var(--line);
  }

  td {
    padding: 9px 10px;
    border-bottom: 1px solid #eef0f3;
    vertical-align: top;
  }

  tr:hover td { background: #fafbfc; }

  .tag {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 600;
    white-space: nowrap;
  }
  .tag.interested { background: #e5f3ec; color: var(--green); }
  .tag.callback { background: #fdf1e2; color: var(--amber); }
  .tag.meeting { background: #e6eef8; color: var(--blue); }
  .tag.voicemail { background: var(--grey-tag); color: var(--slate); }
  .tag.noanswer { background: var(--grey-tag); color: var(--slate); }
  .tag.hungup { background: #fbeae8; color: var(--red); }
  .tag.wrongnumber { background: var(--grey-tag); color: var(--slate); }
  .tag.gatekeeper { background: var(--grey-tag); color: var(--slate); }
  .tag.notinterested { background: var(--grey-tag); color: var(--slate); }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .filters select, .filters input {
    width: auto;
    min-width: 130px;
  }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--slate-light);
    font-size: 13.5px;
  }

  .link-ref {
    font-size: 12.5px;
    color: var(--blue);
    word-break: break-all;
  }

  .table-wrap { overflow-x: auto; }

  .person-breakdown {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }

  .person-card {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    background: #fbfcfd;
  }
  .person-card .name {
    font-weight: 700;
    color: var(--navy);
    font-size: 14px;
    margin-bottom: 8px;
  }
  .person-card .metric-row {
    display: flex;
    justify-content: space-between;
    font-size: 12.5px;
    color: var(--slate);
    padding: 2px 0;
  }
  .person-card .metric-row b { color: #1b2431; }

  .save-msg {
    font-size: 12px;
    color: var(--green);
    margin-left: 10px;
    opacity: 0;
    transition: opacity .3s;
  }
  .save-msg.show { opacity: 1; }

  .notice {
    background: #fff8ec;
    border: 1px solid #f0dfb8;
    color: #8a6a1f;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12.5px;
    margin-bottom: 16px;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--slate-light);
  }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="loading">Loading…</div>
</div>

<script>
const OUTCOMES = [
  { key: "interested", label: "Interested", tagClass: "interested" },
  { key: "callback", label: "Callback requested", tagClass: "callback" },
  { key: "meeting", label: "Meeting booked", tagClass: "meeting" },
  { key: "voicemail", label: "Voicemail / answering machine", tagClass: "voicemail" },
  { key: "noanswer", label: "No answer", tagClass: "noanswer" },
  { key: "hungup", label: "Hung up", tagClass: "hungup" },
  { key: "gatekeeper", label: "Blocked by gatekeeper", tagClass: "gatekeeper" },
  { key: "wrongnumber", label: "Wrong number", tagClass: "wrongnumber" },
  { key: "notinterested", label: "Not interested", tagClass: "notinterested" },
];

function outcomeMeta(key) {
  return OUTCOMES.find(o => o.key === key) || OUTCOMES[4];
}

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function uid() {
  return 'c' + Date.now() + Math.random().toString(36).slice(2,8);
}

let state = {
  view: 'log',
  interns: [],
  calls: [],
  loaded: false,
  filterIntern: 'all',
  filterOutcome: 'all',
  filterDate: '',
};

async function loadAll() {
  try {
    const internsRes = await window.storage.get('interns-list', true);
    state.interns = internsRes ? JSON.parse(internsRes.value) : [];
  } catch(e) { state.interns = []; }

  try {
    const listRes = await window.storage.list('call:', true);
    const keys = listRes && listRes.keys ? listRes.keys : [];
    const calls = [];
    for (const k of keys) {
      try {
        const r = await window.storage.get(k, true);
        if (r && r.value) calls.push(JSON.parse(r.value));
      } catch(e) {}
    }
    calls.sort((a,b) => (b.date + b.createdAt).localeCompare(a.date + a.createdAt));
    state.calls = calls;
  } catch(e) { state.calls = []; }

  state.loaded = true;
  render();
}

async function saveInternsList() {
  try {
    await window.storage.set('interns-list', JSON.stringify(state.interns), true);
  } catch(e) { console.error('Failed saving interns list', e); }
}

async function saveCall(call) {
  try {
    await window.storage.set('call:' + call.id, JSON.stringify(call), true);
    return true;
  } catch(e) {
    console.error('Failed saving call', e);
    return false;
  }
}

async function deleteCall(id) {
  try {
    await window.storage.delete('call:' + id, true);
    state.calls = state.calls.filter(c => c.id !== id);
    render();
  } catch(e) { console.error('Failed deleting call', e); }
}

function setView(v) {
  state.view = v;
  render();
}

function flashSave(elId) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1600);
}

// ---------- RENDER ----------

function render() {
  const app = document.getElementById('app');
  if (!state.loaded) {
    app.innerHTML = '<div class="loading">Loading…</div>';
    return;
  }

  app.innerHTML = `
    <div class="topbar">
      <div>
        <h1>Outreach Call Log</h1>
        <div class="sub">Daily call tracking &amp; pipeline for the outreach team</div>
      </div>
    </div>
    <nav>
      <button class="${state.view==='log'?'active':''}" onclick="setView('log')">Log a Call</button>
      <button class="${state.view==='dashboard'?'active':''}" onclick="setView('dashboard')">Dashboard</button>
      <button class="${state.view==='pipeline'?'active':''}" onclick="setView('pipeline')">Pipeline</button>
      <button class="${state.view==='all'?'active':''}" onclick="setView('all')">All Calls</button>
      <button class="${state.view==='team'?'active':''}" onclick="setView('team')">Team</button>
    </nav>
    <div id="viewRoot"></div>
  `;

  const root = document.getElementById('viewRoot');
  if (state.view === 'log') root.innerHTML = renderLogView();
  else if (state.view === 'dashboard') root.innerHTML = renderDashboard();
  else if (state.view === 'pipeline') root.innerHTML = renderPipeline();
  else if (state.view === 'all') root.innerHTML = renderAllCalls();
  else if (state.view === 'team') root.innerHTML = renderTeam();

  attachHandlers();
}

function internOptions(selected) {
  if (state.interns.length === 0) {
    return '<option value="">Add team members in the Team tab first</option>';
  }
  return state.interns.map(n =>
    `<option value="${escapeAttr(n)}" ${n===selected?'selected':''}>${escapeHtml(n)}</option>`
  ).join('');
}

function outcomeOptions(selected) {
  return OUTCOMES.map(o =>
    `<option value="${o.key}" ${o.key===selected?'selected':''}>${o.label}</option>`
  ).join('');
}

function renderLogView() {
  return `
    <div class="card">
      <h2>Log a call <span class="save-msg" id="saveMsg">Saved ✓</span></h2>
      ${state.interns.length === 0 ? '<div class="notice">No team members added yet. Go to the <b>Team</b> tab to add names first, then come back here.</div>' : ''}
      <form id="callForm">
        <div class="grid2">
          <div class="field">
            <label>Date</label>
            <input type="date" name="date" value="${todayStr()}" required>
          </div>
          <div class="field">
            <label>Caller</label>
            <select name="intern" required>
              <option value="">Select…</option>
              ${internOptions('')}
            </select>
          </div>
        </div>
        <div class="grid2">
          <div class="field">
            <label>Firm / Company called</label>
            <input type="text" name="firm" placeholder="e.g. Hallworth Architects" required>
          </div>
          <div class="field">
            <label>Contact person (optional)</label>
            <input type="text" name="contact" placeholder="e.g. James, Office Manager">
          </div>
        </div>
        <div class="grid2">
          <div class="field">
            <label>Outcome</label>
            <select name="outcome" required>
              <option value="">Select…</option>
              ${outcomeOptions('')}
            </select>
          </div>
          <div class="field">
            <label>Follow-up date (if applicable)</label>
            <input type="date" name="followUp">
          </div>
        </div>
        <div class="field">
          <label>Notes</label>
          <textarea name="notes" placeholder="Anything worth remembering — what they build, who else to speak to, objections raised..."></textarea>
        </div>
        <div class="field">
          <label>Recording reference (link to where the recording is saved, if any)</label>
          <input type="text" name="recording" placeholder="e.g. Drive link, or filename in shared folder">
        </div>
        <div class="row-actions">
          <button type="submit" class="btn">Save call</button>
        </div>
      </form>
    </div>
    <div class="card">
      <h2>Today's calls</h2>
      ${renderTodayMiniList()}
    </div>
  `;
}

function renderTodayMiniList() {
  const today = todayStr();
  const todays = state.calls.filter(c => c.date === today);
  if (todays.length === 0) return '<div class="empty">No calls logged yet today.</div>';
  return `
    <div class="table-wrap">
    <table>
      <thead><tr><th>Caller</th><th>Firm</th><th>Outcome</th><th>Notes</th></tr></thead>
      <tbody>
        ${todays.map(c => {
          const om = outcomeMeta(c.outcome);
          return `<tr>
            <td>${escapeHtml(c.intern)}</td>
            <td>${escapeHtml(c.firm)}</td>
            <td><span class="tag ${om.tagClass}">${om.label}</span></td>
            <td>${escapeHtml(c.notes || '—')}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>
  `;
}

function renderDashboard() {
  const today = todayStr();
  const todays = state.calls.filter(c => c.date === today);
  const total = state.calls.length;
  const totalToday = todays.length;

  const count = (list, key) => list.filter(c => c.outcome === key).length;

  const answered = (list) => list.filter(c => !['voicemail','noanswer','wrongnumber','gatekeeper'].includes(c.outcome)).length;

  const meetingsTotal = count(state.calls, 'meeting');
  const interestedTotal = count(state.calls, 'interested') + count(state.calls, 'callback');

  const byIntern = {};
  state.interns.forEach(n => byIntern[n] = { calls: 0, answered: 0, voicemail: 0, hungup: 0, meetings: 0, interested: 0 });
  state.calls.forEach(c => {
    if (!byIntern[c.intern]) byIntern[c.intern] = { calls: 0, answered: 0, voicemail: 0, hungup: 0, meetings: 0, interested: 0 };
    byIntern[c.intern].calls++;
    if (!['voicemail','noanswer','wrongnumber','gatekeeper'].includes(c.outcome)) byIntern[c.intern].answered++;
    if (c.outcome === 'voicemail') byIntern[c.intern].voicemail++;
    if (c.outcome === 'hungup') byIntern[c.intern].hungup++;
    if (c.outcome === 'meeting') byIntern[c.intern].meetings++;
    if (c.outcome === 'interested' || c.outcome === 'callback') byIntern[c.intern].interested++;
  });

  return `
    <div class="card">
      <h2>Overview — all time</h2>
      <div class="stat-grid">
        <div class="stat"><div class="num">${total}</div><div class="lbl">Total calls logged</div></div>
        <div class="stat"><div class="num">${totalToday}</div><div class="lbl">Calls today</div></div>
        <div class="stat"><div class="num">${answered(state.calls)}</div><div class="lbl">Actually answered</div></div>
        <div class="stat"><div class="num">${count(state.calls,'voicemail')}</div><div class="lbl">Voicemail / machine</div></div>
        <div class="stat"><div class="num">${count(state.calls,'hungup')}</div><div class="lbl">Hung up</div></div>
        <div class="stat"><div class="num">${interestedTotal}</div><div class="lbl">Interested / callback</div></div>
        <div class="stat"><div class="num">${meetingsTotal}</div><div class="lbl">Meetings booked</div></div>
      </div>
    </div>
    <div class="card">
      <h2>By team member</h2>
      ${state.interns.length === 0 ? '<div class="empty">Add team members in the Team tab to see a breakdown.</div>' : `
      <div class="person-breakdown">
        ${state.interns.map(n => {
          const s = byIntern[n];
          return `
          <div class="person-card">
            <div class="name">${escapeHtml(n)}</div>
            <div class="metric-row"><span>Calls made</span><b>${s.calls}</b></div>
            <div class="metric-row"><span>Answered</span><b>${s.answered}</b></div>
            <div class="metric-row"><span>Voicemail</span><b>${s.voicemail}</b></div>
            <div class="metric-row"><span>Hung up</span><b>${s.hungup}</b></div>
            <div class="metric-row"><span>Interested / callback</span><b>${s.interested}</b></div>
            <div class="metric-row"><span>Meetings booked</span><b>${s.meetings}</b></div>
          </div>`;
        }).join('')}
      </div>`}
    </div>
  `;
}

function renderPipeline() {
  const pipelineOutcomes = ['interested', 'callback', 'meeting'];
  let entries = state.calls.filter(c => pipelineOutcomes.includes(c.outcome));

  entries = entries.slice().sort((a,b) => {
    const fa = a.followUp || '9999-99-99';
    const fb = b.followUp || '9999-99-99';
    return fa.localeCompare(fb);
  });

  if (entries.length === 0) {
    return `<div class="card"><h2>Pipeline</h2><div class="empty">No live leads yet — entries marked Interested, Callback Requested, or Meeting Booked will show up here.</div></div>`;
  }

  return `
    <div class="card">
      <h2>Pipeline — leads worth following up</h2>
      <div class="table-wrap">
      <table>
        <thead><tr><th>Firm</th><th>Contact</th><th>Caller</th><th>Status</th><th>Follow-up date</th><th>Notes</th></tr></thead>
        <tbody>
          ${entries.map(c => {
            const om = outcomeMeta(c.outcome);
            const overdue = c.followUp && c.followUp < todayStr();
            return `<tr>
              <td>${escapeHtml(c.firm)}</td>
              <td>${escapeHtml(c.contact || '—')}</td>
              <td>${escapeHtml(c.intern)}</td>
              <td><span class="tag ${om.tagClass}">${om.label}</span></td>
              <td style="${overdue ? 'color:var(--red);font-weight:700;' : ''}">${c.followUp ? c.followUp + (overdue ? ' (overdue)' : '') : '—'}</td>
              <td>${escapeHtml(c.notes || '—')}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>
    </div>
  `;
}

function renderAllCalls() {
  let filtered = state.calls;
  if (state.filterIntern !== 'all') filtered = filtered.filter(c => c.intern === state.filterIntern);
  if (state.filterOutcome !== 'all') filtered = filtered.filter(c => c.outcome === state.filterOutcome);
  if (state.filterDate) filtered = filtered.filter(c => c.date === state.filterDate);

  return `
    <div class="card">
      <h2>All calls</h2>
      <div class="filters">
        <select id="fIntern">
          <option value="all">All callers</option>
          ${state.interns.map(n => `<option value="${escapeAttr(n)}" ${state.filterIntern===n?'selected':''}>${escapeHtml(n)}</option>`).join('')}
        </select>
        <select id="fOutcome">
          <option value="all">All outcomes</option>
          ${OUTCOMES.map(o => `<option value="${o.key}" ${state.filterOutcome===o.key?'selected':''}>${o.label}</option>`).join('')}
        </select>
        <input type="date" id="fDate" value="${state.filterDate}">
        <button class="btn secondary small" onclick="clearFilters()">Clear filters</button>
      </div>
      ${filtered.length === 0 ? '<div class="empty">No calls match these filters.</div>' : `
      <div class="table-wrap">
      <table>
        <thead><tr><th>Date</th><th>Caller</th><th>Firm</th><th>Contact</th><th>Outcome</th><th>Follow-up</th><th>Notes</th><th>Recording</th><th></th></tr></thead>
        <tbody>
          ${filtered.map(c => {
            const om = outcomeMeta(c.outcome);
            return `<tr>
              <td>${c.date}</td>
              <td>${escapeHtml(c.intern)}</td>
              <td>${escapeHtml(c.firm)}</td>
              <td>${escapeHtml(c.contact || '—')}</td>
              <td><span class="tag ${om.tagClass}">${om.label}</span></td>
              <td>${c.followUp || '—'}</td>
              <td>${escapeHtml(c.notes || '—')}</td>
              <td>${c.recording ? `<span class="link-ref">${escapeHtml(c.recording)}</span>` : '—'}</td>
              <td><button class="btn secondary small" onclick="confirmDelete('${c.id}')">Delete</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>`}
    </div>
  `;
}

function renderTeam() {
  return `
    <div class="card">
      <h2>Team members</h2>
      <form id="addInternForm" class="row-actions" style="margin-bottom:16px;">
        <input type="text" id="newInternName" placeholder="Add a name, e.g. Ali" style="max-width:260px;">
        <button type="submit" class="btn small">Add</button>
      </form>
      ${state.interns.length === 0 ? '<div class="empty">No team members yet. Add names above so they can be selected when logging calls.</div>' : `
      <table>
        <thead><tr><th>Name</th><th></th></tr></thead>
        <tbody>
          ${state.interns.map(n => `<tr><td>${escapeHtml(n)}</td><td><button class="btn secondary small" onclick="removeIntern('${escapeAttr(n)}')">Remove</button></td></tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  `;
}

function attachHandlers() {
  const callForm = document.getElementById('callForm');
  if (callForm) {
    callForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(callForm);
      const call = {
        id: uid(),
        date: fd.get('date'),
        intern: fd.get('intern'),
        firm: fd.get('firm'),
        contact: fd.get('contact'),
        outcome: fd.get('outcome'),
        followUp: fd.get('followUp'),
        notes: fd.get('notes'),
        recording: fd.get('recording'),
        createdAt: new Date().toISOString(),
      };
      const ok = await saveCall(call);
      if (ok) {
        state.calls.unshift(call);
        render();
        flashSave('saveMsg');
      } else {
        alert('Could not save this call — please try again.');
      }
    });
  }

  const addInternForm = document.getElementById('addInternForm');
  if (addInternForm) {
    addInternForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('newInternName');
      const name = input.value.trim();
      if (!name) return;
      if (state.interns.includes(name)) { input.value=''; return; }
      state.interns.push(name);
      await saveInternsList();
      render();
    });
  }

  const fIntern = document.getElementById('fIntern');
  if (fIntern) fIntern.addEventListener('change', () => { state.filterIntern = fIntern.value; render(); });
  const fOutcome = document.getElementById('fOutcome');
  if (fOutcome) fOutcome.addEventListener('change', () => { state.filterOutcome = fOutcome.value; render(); });
  const fDate = document.getElementById('fDate');
  if (fDate) fDate.addEventListener('change', () => { state.filterDate = fDate.value; render(); });
}

async function removeIntern(name) {
  if (!confirm(`Remove ${name} from the team list? Their past call logs will stay recorded.`)) return;
  state.interns = state.interns.filter(n => n !== name);
  await saveInternsList();
  render();
}

function confirmDelete(id) {
  if (confirm('Delete this call entry? This cannot be undone.')) {
    deleteCall(id);
  }
}

function clearFilters() {
  state.filterIntern = 'all';
  state.filterOutcome = 'all';
  state.filterDate = '';
  render();
}

function escapeHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}
function escapeAttr(str) {
  return escapeHtml(str);
}

// expose functions used by inline handlers
window.setView = setView;
window.removeIntern = removeIntern;
window.confirmDelete = confirmDelete;
window.clearFilters = clearFilters;

loadAll();
</script>
</body>
</html>
